<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Refaccionaria Millán</title>
    <style>
        :root {
            --bg: #0a0e1a; --bg2: #131929; --bg3: #1a2440;
            --red: #c8102e; --green: #059669;
            --txt: #e0eaff; --txtD: #7890b8; --bdr: #1e3058;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; background:var(--bg); color:var(--txt); font-family:Arial,sans-serif; }
        .app { display:flex; flex-direction:column; height:100vh; }

        /* HEADER */
        .header {
            background:linear-gradient(135deg,#8b0000,var(--red));
            padding:14px 16px;
            display:flex; align-items:center; gap:12px;
            box-shadow:0 4px 16px rgba(200,16,46,0.3);
        }
        .logo { font-size:28px; }
        .header-info { flex:1; }
        .header-title { font-size:18px; font-weight:800; color:#fff; }
        .header-sub { font-size:11px; color:rgba(255,255,255,0.7); }
        .btn-admin {
            background:rgba(255,255,255,0.15);
            border:1px solid rgba(255,255,255,0.3);
            color:#fff; padding:8px 14px; border-radius:8px;
            cursor:pointer; font-size:12px; font-weight:700;
            text-decoration:none;
        }

        /* SEARCH */
        .search-bar {
            background:var(--bg2);
            padding:12px 16px;
            border-bottom:1px solid var(--bdr);
        }
        .search-wrap { display:flex; gap:8px; }
        .search-input {
            flex:1; padding:10px 14px; border-radius:8px;
            border:1px solid var(--bdr); background:var(--bg3);
            color:var(--txt); font-size:14px;
        }
        .search-input:focus { outline:none; border-color:var(--red); }
        .cat-scroll {
            display:flex; gap:8px; margin-top:10px;
            overflow-x:auto; padding-bottom:4px;
        }
        .cat-scroll::-webkit-scrollbar { display:none; }
        .cat-btn {
            white-space:nowrap; padding:6px 14px;
            border-radius:20px; border:1px solid var(--bdr);
            background:var(--bg3); color:var(--txtD);
            cursor:pointer; font-size:11px; font-weight:600;
        }
        .cat-btn.active { background:var(--red); border-color:var(--red); color:#fff; }

        /* STATS */
        .stats {
            display:flex; gap:12px;
            padding:12px 16px; background:var(--bg2);
            border-bottom:1px solid var(--bdr);
        }
        .stat { flex:1; text-align:center; }
        .stat-val { font-size:20px; font-weight:800; color:var(--red); }
        .stat-lbl { font-size:10px; color:var(--txtD); text-transform:uppercase; }

        /* PRODUCTOS */
        .content { flex:1; overflow-y:auto; padding:14px; }
        .productos-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

        .producto-card {
            background:var(--bg2); border:1px solid var(--bdr);
            border-radius:10px; padding:12px; cursor:pointer;
            transition:all 0.15s;
        }
        .producto-card:active { transform:scale(0.97); border-color:var(--red); }
        .p-codigo { font-size:10px; color:var(--red); font-weight:800; margin-bottom:4px; }
        .p-desc { font-size:12px; line-height:1.4; margin-bottom:8px; }
        .p-footer { display:flex; justify-content:space-between; align-items:center; }
        .p-precio { font-size:15px; font-weight:800; color:var(--green); }
        .p-stock {
            font-size:10px; padding:3px 7px;
            background:var(--bg3); border-radius:4px; color:var(--txtD);
        }
        .p-stock.bajo { color:#ff6b35; }

        .empty { text-align:center; padding:60px 20px; color:var(--txtD); grid-column:1/-1; }
        .loading { text-align:center; padding:40px; color:var(--txtD); grid-column:1/-1; }

        /* MODAL */
        .modal-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.8); z-index:999;
            align-items:flex-end; justify-content:center;
            padding:16px;
        }
        .modal-overlay.active { display:flex; }
        .modal {
            background:var(--bg2); border-radius:16px;
            padding:20px; width:100%; max-width:400px;
        }
        .modal-codigo { font-size:12px; color:var(--red); font-weight:800; margin-bottom:6px; }
        .modal-desc { font-size:16px; font-weight:700; margin-bottom:12px; }
        .modal-row { display:flex; gap:12px; margin-bottom:16px; }
        .modal-stat { flex:1; text-align:center; background:var(--bg3); border-radius:8px; padding:12px; }
        .modal-stat-val { font-size:22px; font-weight:800; }
        .modal-stat-lbl { font-size:10px; color:var(--txtD); }
        .modal-close {
            width:100%; padding:12px; background:var(--red);
            border:none; border-radius:8px; color:#fff;
            font-size:14px; font-weight:700; cursor:pointer;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">🔧</div>
        <div class="header-info">
            <div class="header-title">Refaccionaria Millán</div>
            <div class="header-sub">Partes Eléctricas Automotrices</div>
        </div>
        <a class="btn-admin" href="admin_refaccionaria_firebase.html">⚙️ Admin</a>
    </div>

    <div class="search-bar">
        <div class="search-wrap">
            <input class="search-input" id="searchInput" type="text" placeholder="🔍 Buscar código o descripción...">
        </div>
        <div class="cat-scroll" id="categorias"></div>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-val" id="totalProductos">0</div>
            <div class="stat-lbl">Productos</div>
        </div>
        <div class="stat">
            <div class="stat-val" id="totalCategorias">0</div>
            <div class="stat-lbl">Categorías</div>
        </div>
        <div class="stat">
            <div class="stat-val" id="productosMostrados">0</div>
            <div class="stat-lbl">Resultados</div>
        </div>
    </div>

    <div class="content">
        <div class="productos-grid" id="productosGrid">
            <div class="loading">⏳ Cargando productos...</div>
        </div>
    </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal">
        <div class="modal-codigo" id="mCodigo"></div>
        <div class="modal-desc" id="mDesc"></div>
        <div class="modal-row">
            <div class="modal-stat">
                <div class="modal-stat-val" id="mPrecio" style="color:var(--green)"></div>
                <div class="modal-stat-lbl">Precio</div>
            </div>
            <div class="modal-stat">
                <div class="modal-stat-val" id="mStock"></div>
                <div class="modal-stat-lbl">Stock</div>
            </div>
        </div>
        <button class="modal-close" onclick="closeModal()">Cerrar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWm_CWDQTN39ICI5vzCoPOiyt1j4eqWEA",
        authDomain: "refacionariamillan.firebaseapp.com",
        projectId: "refacionariamillan",
        storageBucket: "refacionariamillan.firebasestorage.app",
        messagingSenderId: "913287506896",
        appId: "1:913287506896:web:8c0913ed76901cf08267d5",
        measurementId: "G-HSS0D587PV"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    let allProductos = [];
    let categoriaActual = 'Todos';

    // Escuchar productos en tiempo real
    onSnapshot(collection(db, 'productos'), snap => {
        allProductos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        buildCategorias();
        renderProductos();
        updateStats();
    });

    function buildCategorias() {
        const cats = ['Todos', ...new Set(allProductos.map(p => p.categoria || 'General'))];
        document.getElementById('categorias').innerHTML = cats.map(c => `
            <button class="cat-btn ${c === categoriaActual ? 'active' : ''}"
                onclick="window.setCategoria('${c}')">${c}</button>
        `).join('');
        document.getElementById('totalCategorias').textContent = cats.length - 1;
    }

    function renderProductos() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        let filtered = allProductos.filter(p =>
            (p.codigo||'').toLowerCase().includes(q) ||
            (p.descripcion||'').toLowerCase().includes(q)
        );
        if (categoriaActual !== 'Todos') {
            filtered = filtered.filter(p => (p.categoria || 'General') === categoriaActual);
        }

        document.getElementById('productosMostrados').textContent = filtered.length;
        const grid = document.getElementById('productosGrid');

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="empty">🔍 No hay productos</div>';
            return;
        }

        grid.innerHTML = filtered.map(p => `
            <div class="producto-card" onclick="window.openModal('${p.id}')">
                <div class="p-codigo">${p.codigo || ''}</div>
                <div class="p-desc">${p.descripcion || ''}</div>
                <div class="p-footer">
                    <div class="p-precio">$${parseFloat(p.precio||0).toFixed(2)}</div>
                    <div class="p-stock ${(p.stock||0) <= 5 ? 'bajo' : ''}">
                        Stock: ${p.stock || 0}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function updateStats() {
        document.getElementById('totalProductos').textContent = allProductos.length;
    }

    // Exponer funciones globales
    window.setCategoria = (cat) => {
        categoriaActual = cat;
        buildCategorias();
        renderProductos();
    };

    window.openModal = (id) => {
        const p = allProductos.find(x => x.id === id);
        if (!p) return;
        document.getElementById('mCodigo').textContent  = p.codigo || '';
        document.getElementById('mDesc').textContent    = p.descripcion || '';
        document.getElementById('mPrecio').textContent  = '$' + parseFloat(p.precio||0).toFixed(2);
        document.getElementById('mStock').textContent   = p.stock || 0;
        document.getElementById('modal').classList.add('active');
    };

    window.closeModal = (e) => {
        if (!e || e.target.id === 'modal') {
            document.getElementById('modal').classList.remove('active');
        }
    };

    document.getElementById('searchInput').addEventListener('input', renderProductos);
</script>
</body>
</html>
