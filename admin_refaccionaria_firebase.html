<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin - Refaccionaria Millán</title>
    <style>
        :root {
            --bg:#0a0e1a; --bg2:#131929; --bg3:#1a2440;
            --red:#c8102e; --green:#059669;
            --txt:#e0eaff; --txtD:#7890b8; --bdr:#1e3058;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; background:var(--bg); color:var(--txt); font-family:Arial,sans-serif; }
        .app { display:flex; flex-direction:column; height:100vh; }
        .header { background:linear-gradient(135deg,#1a0010,var(--red)); padding:14px 16px; display:flex; align-items:center; gap:12px; box-shadow:0 4px 16px rgba(200,16,46,0.3); }
        .header-title { flex:1; font-size:18px; font-weight:800; color:#fff; }
        .btn-back { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:#fff; padding:8px 14px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:700; text-decoration:none; }
        .tabs { display:flex; background:var(--bg2); border-bottom:1px solid var(--bdr); }
        .tab { flex:1; padding:12px; border:none; background:transparent; color:var(--txtD); cursor:pointer; font-size:12px; font-weight:700; text-transform:uppercase; border-bottom:2px solid transparent; }
        .tab.active { color:var(--red); border-bottom-color:var(--red); }
        .content { flex:1; overflow-y:auto; padding:14px; }
        .panel { display:none; }
        .panel.active { display:block; }
        .form-card { background:var(--bg2); border:1px solid var(--bdr); border-radius:12px; padding:16px; margin-bottom:14px; }
        .form-title { font-size:14px; font-weight:800; margin-bottom:14px; color:var(--red); }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
        .form-group { display:flex; flex-direction:column; gap:6px; }
        .form-group.full { grid-column:1/-1; }
        label { font-size:11px; color:var(--txtD); text-transform:uppercase; font-weight:700; }
        input, select { padding:10px 12px; border-radius:8px; border:1px solid var(--bdr); background:var(--bg3); color:var(--txt); font-size:13px; }
        input:focus, select:focus { outline:none; border-color:var(--red); }
        .btn-save { width:100%; padding:14px; background:var(--green); border:none; border-radius:8px; color:#fff; font-size:14px; font-weight:800; cursor:pointer; margin-top:4px; }
        .btn-save:active { transform:scale(0.98); }
        .msg { text-align:center; font-size:12px; margin-top:10px; height:20px; }
        .msg.ok { color:var(--green); }
        .msg.err { color:var(--red); }
        .search-admin { padding:10px 14px; border-radius:8px; border:1px solid var(--bdr); background:var(--bg3); color:var(--txt); font-size:13px; width:100%; margin-bottom:14px; }
        .prod-item { background:var(--bg2); border:1px solid var(--bdr); border-radius:10px; padding:12px; margin-bottom:10px; display:flex; align-items:center; gap:12px; }
        .prod-info { flex:1; }
        .prod-codigo { font-size:10px; color:var(--red); font-weight:800; }
        .prod-desc { font-size:12px; margin:2px 0; }
        .prod-meta { font-size:11px; color:var(--txtD); }
        .prod-precio { color:var(--green); font-weight:700; }
        .btn-del { background:rgba(200,16,46,0.15); border:1px solid rgba(200,16,46,0.3); color:var(--red); padding:8px 10px; border-radius:6px; cursor:pointer; font-size:14px; }
        .empty { text-align:center; padding:40px; color:var(--txtD); }
        .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
        .stat-card { background:var(--bg2); border:1px solid var(--bdr); border-radius:10px; padding:16px; text-align:center; }
        .stat-val { font-size:28px; font-weight:800; color:var(--red); }
        .stat-lbl { font-size:11px; color:var(--txtD); text-transform:uppercase; margin-top:4px; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="header-title">⚙️ Admin — Refaccionaria</div>
        <a class="btn-back" href="index.html">← Tienda</a>
    </div>
    <div class="tabs">
        <button class="tab active" onclick="switchTab('agregar',this)">➕ Agregar</button>
        <button class="tab" onclick="switchTab('lista',this)">📦 Productos</button>
        <button class="tab" onclick="switchTab('stats',this)">📊 Resumen</button>
    </div>
    <div class="content">
        <div class="panel active" id="agregarPanel">
            <div class="form-card">
                <div class="form-title">➕ Nuevo Producto</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Código</label>
                        <input id="fCodigo" type="text" placeholder="FOC-001">
                    </div>
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="fCategoria">
                            <option>Focos e Iluminación</option>
                            <option>Reguladores</option>
                            <option>Bobinas</option>
                            <option>Baterías</option>
                            <option>Motores</option>
                            <option>Alternadores</option>
                            <option>Correas</option>
                            <option>Filtros</option>
                            <option>Bujías</option>
                            <option>Frenos</option>
                            <option>Sensores</option>
                            <option>General</option>
                        </select>
                    </div>
                </div>
                <div class="form-group full" style="margin-bottom:10px">
                    <label>Descripción</label>
                    <input id="fDesc" type="text" placeholder="Foco H4 55/60W Universal">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Precio ($)</label>
                        <input id="fPrecio" type="number" placeholder="150.00" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Stock</label>
                        <input id="fStock" type="number" placeholder="50">
                    </div>
                </div>
                <button class="btn-save" onclick="guardarProducto()">✅ GUARDAR PRODUCTO</button>
                <div class="msg" id="formMsg"></div>
            </div>
        </div>
        <div class="panel" id="listaPanel">
            <input class="search-admin" type="text" id="searchAdmin" placeholder="🔍 Buscar en inventario..." oninput="renderLista()">
            <div id="listaProductos"><div class="empty">⏳ Cargando...</div></div>
        </div>
        <div class="panel" id="statsPanel">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-val" id="sTotalProd">0</div><div class="stat-lbl">Total Productos</div></div>
                <div class="stat-card"><div class="stat-val" id="sTotalCat">0</div><div class="stat-lbl">Categorías</div></div>
                <div class="stat-card"><div class="stat-val" id="sBajoStock" style="color:#ff6b35">0</div><div class="stat-lbl">Stock Bajo</div></div>
                <div class="stat-card"><div class="stat-val" id="sValorTotal" style="color:var(--green);font-size:18px">$0</div><div class="stat-lbl">Valor Inventario</div></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ── Variables globales ──────────────────────────────
    let productos = [];
    let dbRef = null;
    let addDocFn = null;
    let deleteDocFn = null;
    let docFn = null;

    // ── UI: Tabs ────────────────────────────────────────
    function switchTab(name, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(name + 'Panel').classList.add('active');
        el.classList.add('active');
    }

    // ── Guardar producto ────────────────────────────────
    async function guardarProducto() {
        const msg = document.getElementById('formMsg');
        if (!dbRef || !addDocFn) { msg.textContent = '⚠️ Firebase no listo'; msg.className = 'msg err'; return; }

        const codigo      = document.getElementById('fCodigo').value.trim().toUpperCase();
        const descripcion = document.getElementById('fDesc').value.trim();
        const precio      = parseFloat(document.getElementById('fPrecio').value);
        const stock       = parseInt(document.getElementById('fStock').value);
        const categoria   = document.getElementById('fCategoria').value;

        if (!codigo || !descripcion || isNaN(precio) || isNaN(stock)) {
            msg.textContent = '⚠️ Completa todos los campos';
            msg.className = 'msg err';
            return;
        }
        try {
            await addDocFn(dbRef, { codigo, descripcion, precio, stock, categoria, creado: new Date().toISOString() });
            msg.textContent = '✅ Producto guardado';
            msg.className = 'msg ok';
            document.getElementById('fCodigo').value = '';
            document.getElementById('fDesc').value   = '';
            document.getElementById('fPrecio').value = '';
            document.getElementById('fStock').value  = '';
            setTimeout(() => msg.textContent = '', 3000);
        } catch(e) {
            msg.textContent = 'Error: ' + e.message;
            msg.className = 'msg err';
        }
    }

    // ── Eliminar producto ───────────────────────────────
    async function eliminarProducto(id) {
        if (!confirm('¿Eliminar este producto?')) return;
        try {
            await deleteDocFn(docFn(dbRef, id));
        } catch(e) { alert('Error: ' + e.message); }
    }

    // ── Render lista ────────────────────────────────────
    function renderLista() {
        const q = (document.getElementById('searchAdmin')?.value || '').toLowerCase();
        const filtrados = productos.filter(p =>
            (p.codigo||'').toLowerCase().includes(q) ||
            (p.descripcion||'').toLowerCase().includes(q) ||
            (p.categoria||'').toLowerCase().includes(q)
        );
        const cont = document.getElementById('listaProductos');
        if (filtrados.length === 0) { cont.innerHTML = '<div class="empty">Sin resultados</div>'; return; }
        cont.innerHTML = filtrados.map(p => `
            <div class="prod-item">
                <div class="prod-info">
                    <div class="prod-codigo">${p.codigo||''} · ${p.categoria||'General'}</div>
                    <div class="prod-desc">${p.descripcion||''}</div>
                    <div class="prod-meta">
                        <span class="prod-precio">$${parseFloat(p.precio||0).toFixed(2)}</span>
                        &nbsp;·&nbsp; Stock: ${p.stock||0}
                    </div>
                </div>
                <button class="btn-del" onclick="eliminarProducto('${p.id}')">🗑️</button>
            </div>
        `).join('');
    }

    // ── Stats ───────────────────────────────────────────
    function updateStats() {
        const cats  = new Set(productos.map(p => p.categoria || 'General'));
        const bajo  = productos.filter(p => (p.stock||0) <= 5).length;
        const valor = productos.reduce((s,p) => s + ((p.precio||0)*(p.stock||0)), 0);
        document.getElementById('sTotalProd').textContent  = productos.length;
        document.getElementById('sTotalCat').textContent   = cats.size;
        document.getElementById('sBajoStock').textContent  = bajo;
        document.getElementById('sValorTotal').textContent = '$' + valor.toLocaleString('es-MX',{minimumFractionDigits:2});
    }

    // ── Inicializar Firebase ─────────────────────────────
    async function initFirebase() {
        const { initializeApp }   = await import("https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js");
        const { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot }
            = await import("https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js");

        const app = initializeApp({
            apiKey: "AIzaSyAWm_CWDQTN39ICI5vzCoPOiyt1j4eqWEA",
            authDomain: "refacionariamillan.firebaseapp.com",
            projectId: "refacionariamillan",
            storageBucket: "refacionariamillan.firebasestorage.app",
            messagingSenderId: "913287506896",
            appId: "1:913287506896:web:8c0913ed76901cf08267d5"
        });

        const db = getFirestore(app);
        dbRef     = collection(db, 'productos');
        addDocFn  = addDoc;
        deleteDocFn = deleteDoc;
        docFn     = (col, id) => doc(db, 'productos', id);

        onSnapshot(dbRef, snap => {
            productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderLista();
            updateStats();
        });
    }

    // Arrancar
    initFirebase();
</script>
</body>
</html>
